[build]
  publish = "."

[[redirects]]
  from = "/about-us"
  to   = "/about.html"
  status = 301

[[redirects]]
  from = "/contact-us"
  to   = "/contact.html"
  status = 301

[[redirects]]
  from = "/all-services/*"
  to   = "/services/:splat.html"
  status = 301

[[redirects]]
  from = "/pricing-plans/*"
  to   = "/pricing.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
